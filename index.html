<!DOCTYPE html>
<html>
<head>
    <title>Sales & Revenue Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Sales & Revenue Analysis Dashboard</h1>

    <div class="upload">
        <input type="file" id="csvFile" accept=".csv">
    </div>

    <div class="cards">
        <div class="card">
            <h3>Total Sales</h3>
            <p id="totalSales">0</p>
        </div>

        <div class="card">
            <h3>Total Revenue</h3>
            <p id="totalRevenue">0</p>
        </div>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Product</th>
                <th>Sales</th>
                <th>Revenue</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="script.js"></script>

</body>
</html>
